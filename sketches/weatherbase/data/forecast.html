<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMA Weather Forecast</title>

    <!-- Favicons and App Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.svg">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #C4B5A8;
            font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif;
            font-size: 35pt;
            color: #3D3630;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-image: url('cantera-background.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: grayscale(100%) sepia(30%) hue-rotate(15deg) brightness(2.2);
            opacity: 0.4;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(139, 142, 107, 0.18), rgba(139, 142, 107, 0.15));
        }

        .title-banner {
            background: linear-gradient(135deg, rgba(139, 142, 107, 0.35) 0%, rgba(119, 122, 87, 0.30) 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            margin: 0 1.5em 20px 1.5em;
            border: 2px solid rgba(107, 111, 76, 0.3);
            position: relative;
        }

        #back-btn {
            position: absolute;
            left: 5px;
            top: 1px;
            background-color: transparent;
            border: none;
            font-size: 28pt;
            cursor: pointer;
            padding: 12px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            color: inherit;
        }

        #lang-toggle {
            position: absolute;
            right: 3px;
            top: 1px;
            background-color: transparent;
            border: none;
            font-size: 28pt;
            cursor: pointer;
            padding: 12px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .layout {
            display: grid;
            grid-template-rows: auto;
            grid-template-columns: 100%;
            grid-template-areas:
                "header"
                "forecast"
                "footer";
            grid-gap: 10px;
        }

        .item-header   { grid-area: header;   padding-top: 1em; position: relative; }
        .item-forecast { grid-area: forecast; padding-left: 2em; padding-right: 2em; }
        .item-footer   { grid-area: footer;   padding-left: 2em; padding-right: 2em; }

        .forecast-table { border-spacing: 0; width: 90%; margin: 0 auto; }
        .forecast-table td        { font-size: 32pt; font-weight: normal; padding: 10px; background-color: transparent; font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif; }
        .forecast-weekend-row td  { font-size: 32pt; font-weight: normal; padding: 10px; background-color: transparent; font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif; }
        .forecast-header-row td   { font-size: 18pt; font-weight: bold; text-align: center; padding: 4px 10px 0 10px; background-color: transparent; font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif; border-bottom: 1px solid rgba(61,54,48,0.3); }

        /* Desktop: shift temp/wind/rain data values right ~2 chars (not headers) */
        .forecast-table tr:not(.forecast-header-row) td:nth-child(3),
        .forecast-table tr:not(.forecast-header-row) td:nth-child(4),
        .forecast-table tr:not(.forecast-header-row) td:nth-child(5)  { padding-left: 54px; }

        .bslash { -webkit-text-stroke: 0.7px currentColor; font-weight: bold; }

        /* ── PHONE LAYOUT ── */
        @media (max-width: 600px) {
            body           { font-size: 20pt; }
            .item-header   { padding-top: 0.4em; }
            .item-forecast { padding-left: 0.1em; padding-right: 0.1em; }
            .item-footer   { padding-left: 0.1em; padding-right: 0.1em; }
            .title-banner  { margin: 0 0.2em 8px 0.2em; }
            #title-sub     { margin-top: -15px !important; }
            .forecast-table { width: 100%; }
            .forecast-table td       { font-size: 16pt; font-weight: bold; padding: 6px 4px; background-color: transparent; font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif; }
            .forecast-weekend-row td { font-size: 16pt; font-weight: bold; padding: 6px 4px; background-color: transparent; font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif; }
            .forecast-header-row td  { font-size: 11pt; padding: 2px 4px 0 4px; }
            /* Phone: shift wind/rain data values right ~1.5 chars (not headers) */
            .forecast-table tr:not(.forecast-header-row) td:nth-child(4),
            .forecast-table tr:not(.forecast-header-row) td:nth-child(5)  { padding-left: 18px; }
            /* Reset desktop shift on temp column for phone */
            .forecast-table tr:not(.forecast-header-row) td:nth-child(3)  { padding-left: 4px; }
            .forecast-table td img   { height: 51px !important; }
            #forecast-header { font-size: 62% !important; }
        }
    </style>
</head>

<body>
    <div class="background-container"></div>
    <div class="background-overlay"></div>
    <div class="layout">

        <div class="item-header">
            <div class="title-banner">
                <a id="back-btn" href="index.html" title="Back to Current Conditions">&#8592;</a>
                <button id="lang-toggle" onclick="toggleLanguage()">🇲🇽</button>
                <center><h1 id="title-main" style="font-size: 135%; color:#4A4038">SMA Weather</h1></center>
                <center><h3 id="title-sub" style="font-size: 60%; color:#5A4F47; margin-top: -35px; margin-bottom: 2px;">Central Mexico 6,614 ft</h3></center>
            </div>
        </div>

        <div class="item-forecast">
            <h3 id="forecast-header" style="font-size: 55%; text-align: center; color: #4A4038;">5-Day Forecast</h3>
            <table id="forecast-table" class="forecast-table"></table>
            <p style="font-size: 40%; color: #5A4F47; margin-top: 10px;">
                <em><span id="lbl-datafrom">Data from</span> <span id="station">-</span> (<a target="_blank" rel="noopener noreferrer" href="http://openweathermap.org">openweathermap.org</a>)</em>
            </p>
        </div>

        <div class="item-footer">
            <p id="footer-text" style="font-size: 40%; text-align: center; color: #5A4F47;">© 2026 SMA Weather</p>
        </div>

    </div>

<script>
    const LATITUDE   = 20.92;
    const LONGITUDE  = -100.74;
    const APIKEY     = "209bf19664d8744294dd1bcd791208c9";

    let currentLang   = "en";
    let cachedDays    = null;
    let cachedOrder   = null;

    const dateoptions = { weekday: 'short', day: 'numeric' };
    const todaydate   = new Date();
    const todaydatestr = todaydate.toLocaleDateString('en-US', dateoptions);

    function formatDateForLang(dateStr, lang) {
        if (dateStr === "-" || lang === "en") return dateStr;
        const days   = { "Sun":"Dom","Mon":"Lun","Tue":"Mar","Wed":"Mié","Thu":"Jue","Fri":"Vie","Sat":"Sáb" };
        const months = { "Jan":"ene","Feb":"feb","Mar":"mar","Apr":"abr","May":"may","Jun":"jun",
                         "Jul":"jul","Aug":"ago","Sep":"sep","Oct":"oct","Nov":"nov","Dec":"dic" };
        let result = dateStr;
        for (const [en, es] of Object.entries(days))   result = result.replace(en, es);
        for (const [en, es] of Object.entries(months)) result = result.replace(en, es);
        return result;
    }

    const translations = {
        en: {
            titleMain:     "SMA Weather",
            titleSub:      "Central Mexico 6,614 ft",
            forecastHeader:"5-Day Forecast",
            tempCol:       "Temp",
            windCol:       "Wind",
            rainCol:       "Rain",
            dataFrom:      "Data from",
            footer:        "© 2026 SMA Weather",
            toggleButton:  "🇲🇽",
            today:         "Today"
        },
        es: {
            titleMain:     "Clima SMA",
            titleSub:      "México Central 2,014 m",
            forecastHeader:"Pronóstico 5 Días",
            tempCol:       "Temp",
            windCol:       "Viento",
            rainCol:       "Lluvia",
            dataFrom:      "Datos de",
            footer:        "© 2026 Clima SMA",
            toggleButton:  "🇺🇸",
            today:         "Hoy"
        }
    };

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById("title-main").innerText      = t.titleMain;
        document.getElementById("title-sub").innerText       = t.titleSub;
        document.getElementById("forecast-header").innerText = t.forecastHeader;
        document.getElementById("lbl-datafrom").innerText    = t.dataFrom;
        document.getElementById("footer-text").innerHTML     = t.footer;
        document.getElementById("lang-toggle").innerText     = t.toggleButton;
        if (cachedDays) buildTable();
    }

    function toggleLanguage() {
        currentLang = currentLang === "en" ? "es" : "en";
        applyLanguage();
    }

    function buildTable() {
        const t = translations[currentLang];
        var isMetric = currentLang === "es";
        var tempUnit = isMetric ? "°C" : "°F";
        var windUnit = isMetric ? "km/h" : "mph";

        var table = "<tr class='forecast-header-row'><td></td><td></td>" +
            "<td>" + t.tempCol + " <span style='font-size:1.0em'>(" + tempUnit + ")</span></td>" +
            "<td>" + t.windCol + " <span style='font-size:1.0em'>(" + windUnit + ")</span></td>" +
            "<td>" + t.rainCol + " <span style='font-size:1.0em'>(mm)</span></td></tr>\n";

        for (let k = 0; k < cachedOrder.length; k++) {
            var d = cachedDays[cachedOrder[k]];
            var date      = new Date(d.dt * 1000);
            var datestr   = date.toLocaleDateString('en-US', dateoptions);
            var dayofweek = date.getDay();

            if (datestr == todaydatestr) datestr = t.today;
            else datestr = formatDateForLang(datestr, currentLang);

            table += (dayofweek == 0 || dayofweek == 6)
                ? "<tr class='forecast-weekend-row'>"
                : "<tr>";

            table += "<td><nobr>" + datestr + "</nobr></td>";

            var icon = d.icon;
            if (!icon.endsWith("d")) icon = icon.slice(0, -1) + "d";
            table += "<td><img src='WeatherIcon" + icon + ".png' height='64'></td>";

            var hi, lo;
            if (isMetric) {
                hi = d.tempMax.toFixed(0);
                lo = d.tempMin.toFixed(0);
            } else {
                hi = ((d.tempMax * 9/5) + 32).toFixed(0);
                lo = ((d.tempMin * 9/5) + 32).toFixed(0);
            }
            table += "<td><nobr>" +
                "<span style='color:#b85042'>" + hi + "</span>" +
                " <span class='bslash'>/</span> " +
                "<span style='color:#5b7c99'>" + lo + "</span>" +
                "</nobr></td>";

            var windspeed = "-";
            if (d.windSpeed != null) {
                windspeed = isMetric
                    ? (d.windSpeed * 3.6).toFixed(1)
                    : (d.windSpeed * 2.23694).toFixed(1);
            }
            table += "<td>" + windspeed + "</td>";

            var rain = d.rain > 0 ? d.rain.toFixed(1) : "-";
            table += "<td>" + rain + "</td>";

            table += "</tr>\n";
        }
        document.getElementById("forecast-table").innerHTML = table;
    }

    function loadForecast() {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                var jsonObj = JSON.parse(this.responseText);

                document.getElementById("station").innerHTML = jsonObj.city.name;

                // Group 3-hour intervals into calendar days
                cachedDays  = {};
                cachedOrder = [];

                for (let i = 0; i < jsonObj.list.length; i++) {
                    var item = jsonObj.list[i];
                    var date = new Date(item.dt * 1000);
                    var dateKey = date.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' });

                    if (!cachedDays[dateKey]) {
                        cachedDays[dateKey] = {
                            dt:         item.dt,
                            tempMin:    item.main.temp_min,
                            tempMax:    item.main.temp_max,
                            rain:       0,
                            windSpeed:  item.wind.speed,
                            icon:       item.weather[0].icon,
                            middayDiff: 999
                        };
                        cachedOrder.push(dateKey);
                    }

                    var d = cachedDays[dateKey];
                    d.tempMin = Math.min(d.tempMin, item.main.temp_min);
                    d.tempMax = Math.max(d.tempMax, item.main.temp_max);
                    if (item.rain && item.rain["3h"]) d.rain += item.rain["3h"];

                    var hour = date.getHours();
                    var diff = Math.abs(hour - 12);
                    if (diff < d.middayDiff) {
                        d.middayDiff = diff;
                        d.icon       = item.weather[0].icon;
                        d.windSpeed  = item.wind.speed;
                    }
                }

                buildTable();
            }
        };
        xhttp.open("GET",
            "https://api.openweathermap.org/data/2.5/forecast?lat=" + LATITUDE +
            "&lon=" + LONGITUDE + "&cnt=40&appid=" + APIKEY + "&units=metric", true);
        xhttp.send();
    }

    loadForecast();
</script>
</body>
</html>
