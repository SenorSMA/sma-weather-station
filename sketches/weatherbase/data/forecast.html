<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMA Weather Forecast</title>

    <!-- Favicons and App Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.svg">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #C4B5A8;
            font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif;
            font-size: 35pt;
            color: #3D3630;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-image: url('cantera-background.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: grayscale(100%) sepia(30%) hue-rotate(15deg) brightness(2.2);
            opacity: 0.4;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(139, 142, 107, 0.18), rgba(139, 142, 107, 0.15));
        }

        .title-banner {
            background: linear-gradient(135deg, rgba(139, 142, 107, 0.35) 0%, rgba(119, 122, 87, 0.30) 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            margin: 0 1.5em 20px 1.5em;
            border: 2px solid rgba(107, 111, 76, 0.3);
            position: relative;
        }

        #back-btn {
            position: absolute;
            left: 5px;
            top: 1px;
            background-color: transparent;
            border: none;
            font-size: 28pt;
            cursor: pointer;
            padding: 12px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            color: inherit;
        }

        .layout {
            display: grid;
            grid-template-rows: auto;
            grid-template-columns: 100%;
            grid-template-areas:
                "header"
                "forecast"
                "footer";
            grid-gap: 10px;
        }

        .item-header   { grid-area: header;   padding-top: 1em; position: relative; }
        .item-forecast { grid-area: forecast; padding-left: 2em; padding-right: 2em; }
        .item-footer   { grid-area: footer;   padding-left: 2em; padding-right: 2em; }

        .forecast-table { border-spacing: 0; width: 90%; margin: 0 auto; }
        .forecast-table td        { font-size: 35pt; padding: 10px; background-color: rgba(246,246,246,0.85); }
        .forecast-weekend-row td  { font-size: 35pt; padding: 10px; background-color: rgba(230,230,230,0.85); }

        .bslash { -webkit-text-stroke: 0.7px currentColor; font-weight: bold; }

        /* ── PHONE LAYOUT ── */
        @media (max-width: 600px) {
            body           { font-size: 20pt; }
            .item-header   { padding-top: 0.4em; }
            .item-forecast { padding-left: 0.1em; padding-right: 0.1em; }
            .item-footer   { padding-left: 0.1em; padding-right: 0.1em; }
            .title-banner  { margin: 0 0.2em 8px 0.2em; }
            #title-sub     { margin-top: -15px !important; }
            .forecast-table { width: 100%; }
            .forecast-table td       { font-size: 14pt; padding: 6px 4px; }
            .forecast-weekend-row td { font-size: 14pt; padding: 6px 4px; }
            #forecast-header { font-size: 62% !important; }
        }
    </style>
</head>

<body>
    <div class="background-container"></div>
    <div class="background-overlay"></div>
    <div class="layout">

        <div class="item-header">
            <div class="title-banner">
                <a id="back-btn" href="index.html" title="Back to Current Conditions">&#8592;</a>
                <center><h1 id="title-main" style="font-size: 135%; color:#4A4038">SMA Weather</h1></center>
                <center><h3 id="title-sub" style="font-size: 60%; color:#5A4F47; margin-top: -35px; margin-bottom: 2px;">Central Mexico 6,614 ft</h3></center>
            </div>
        </div>

        <div class="item-forecast">
            <h3 id="forecast-header" style="font-size: 55%; text-align: center; color: #4A4038;">16-Day Forecast</h3>
            <table id="forecast-table" class="forecast-table"></table>
            <p style="font-size: 40%; color: #5A4F47; margin-top: 10px;">
                <em>Data from <span id="station">-</span> (<a target="_blank" rel="noopener noreferrer" href="http://openweathermap.org">openweathermap.org</a>)</em>
            </p>
        </div>

        <div class="item-footer">
            <p style="font-size: 40%; text-align: center; color: #5A4F47;">© 2026 SMA Weather</p>
        </div>

    </div>

<script>
    const LATITUDE   = 20.92;
    const LONGITUDE  = -100.74;
    const NUMDAYS    = 16;
    const APIKEY     = "209bf19664d8744294dd1bcd791208c9";

    let windSpeedUnit = "mph";

    const dateoptions     = { weekday: 'short', day: 'numeric' };
    const todaydate       = new Date();
    const todaydatestr    = todaydate.toLocaleDateString('en-US', dateoptions);
    const tomorrowdate    = new Date();
    tomorrowdate.setDate(tomorrowdate.getDate() + 1);
    const tomorrowdatestr = tomorrowdate.toLocaleDateString('en-US', dateoptions);

    function loadForecast() {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                var jsonObj = JSON.parse(this.responseText);
                var table = "";

                document.getElementById("station").innerHTML = jsonObj.city.name;

                for (let i = 0; i < jsonObj.list.length; i++) {
                    var datestr   = new Date(jsonObj.list[i].dt * 1000).toLocaleDateString('en-US', dateoptions);
                    var dayofweek = new Date(jsonObj.list[i].dt * 1000).getDay();

                    if (datestr == todaydatestr)         datestr = "Today";
                    else if (datestr == tomorrowdatestr) datestr = "Tomorrow";

                    table += (dayofweek == 0 || dayofweek == 6)
                        ? "<tr class='forecast-weekend-row'>"
                        : "<tr>";

                    table += "<td><nobr>" + datestr + "</nobr></td>";

                    // Weather icon
                    var icon = jsonObj.list[i].weather[0].icon;
                    if (!icon.endsWith("d")) icon = icon.slice(0, -1) + "d";
                    table += "<td><img src='WeatherIcon" + icon + ".png' height='80'></td>";

                    // Temperature high/low
                    var hiF  = ((jsonObj.list[i].temp.max * 9/5) + 32).toFixed(0);
                    var loF  = ((jsonObj.list[i].temp.min * 9/5) + 32).toFixed(0);
                    table += "<td><nobr>" +
                        "<span style='color:#b85042'>" + hiF + "</span>" +
                        " <span class='bslash'>/</span> " +
                        "<span style='color:#5b7c99'>" + loF + "</span>" +
                        " &#8457;</nobr></td>";

                    // Wind speed + direction
                    var windspeed = "-";
                    var windspeedval = jsonObj.list[i].speed;
                    if (windspeedval != null && windspeedval != "-") {
                        switch(windSpeedUnit) {
                            case "mph": windspeed = (windspeedval * 2.23694).toFixed(1) + " mph"; break;
                            case "m/s": windspeed = windspeedval.toFixed(1) + " <sup>m</sup><span class='bslash'>&frasl;</span><sub>s</sub>"; break;
                            case "kn":  windspeed = (windspeedval * 1.94384).toFixed(1) + " kn"; break;
                        }
                    }
                    if (jsonObj.list[i].deg != null && jsonObj.list[i].deg != "-") {
                        var winddeg   = jsonObj.list[i].deg;
                        var windabbr  = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
                        var windindex = Math.round(((winddeg %= 360) < 0 ? winddeg + 360 : winddeg) / 22.5) % 16;
                        windspeed += " <img src='wind" + windabbr[windindex] + ".png' height='32' style='vertical-align:middle'> <nobr>" + windabbr[windindex] + "</nobr>";
                    }
                    table += "<td>" + windspeed + "</td>";

                    // Rain
                    var rain = "-";
                    if (jsonObj.list[i].rain != undefined)
                        rain = jsonObj.list[i].rain.toFixed(1) + " mm";
                    table += rain != "-"
                        ? "<td><img src='raindrop.png' height='40' style='vertical-align:middle'> " + rain + "</td>"
                        : "<td>" + rain + "</td>";

                    table += "</tr>\n";
                }
                document.getElementById("forecast-table").innerHTML = table;
            }
        };
        xhttp.open("GET",
            "https://api.openweathermap.org/data/2.5/forecast/daily?lat=" + LATITUDE +
            "&lon=" + LONGITUDE + "&cnt=" + NUMDAYS + "&appid=" + APIKEY + "&units=metric", true);
        xhttp.send();
    }

    loadForecast();
</script>
</body>
</html>
