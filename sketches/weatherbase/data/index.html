<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMA Weather Station</title>
   
   <!-- Favicons and App Icons -->
          <link rel="icon" type="image/svg+xml" href="favicon.svg">
          <link rel="apple-touch-icon" href="apple-touch-icon.svg">
          <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.svg">
              
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #C4B5A8;
            font-family: 'Bodoni MT', Didot, 'Book Antiqua', Georgia, serif;
            font-size: 35pt;
            color: #3D3630;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background-image: url('cantera-background.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: grayscale(100%) sepia(30%) hue-rotate(15deg) brightness(2.2);
            opacity: 0.4;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(139, 142, 107, 0.18), rgba(139, 142, 107, 0.15));
        }

        .title-banner {
            background: linear-gradient(135deg, rgba(139, 142, 107, 0.35) 0%, rgba(119, 122, 87, 0.30) 100%);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            margin: 0 1.5em 20px 1.5em;
            border: 2px solid rgba(107, 111, 76, 0.3);
            position: relative;
        }

        #lang-toggle {
            position: absolute;
            right: 5px;
            top: 5px;
            background-color: transparent;
            border: none;
            font-size: 28pt;
            cursor: pointer;
            padding: 12px;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }

        .layout {
            display: grid;
            grid-template-rows: auto;
            grid-template-columns: 100%;
            grid-template-areas:
                "header"
                "current"
                "forecast"
                "footer";
            grid-gap: 10px;
        }

        .item-header   { grid-area: header;   padding-top: 1em; position: relative; }
        .item-current  { grid-area: current;  padding-left: 2em; padding-right: 2em; }
        .item-forecast { grid-area: forecast; padding-left: 2em; padding-right: 2em; }
        .item-footer   { grid-area: footer;   padding-left: 2em; padding-right: 2em; }

        table { margin-left: 2em; }
        td { font-size: 35pt; padding-right: 20px; padding-bottom: 10px; }
        .forecast-table td        { font-size: 35pt; padding: 10px; background-color: #F6F6F6; }
        .forecast-weekend-row td  { font-size: 35pt; padding: 10px; background-color: #E6E6E6; }

        #weather-table {
            border-spacing: 0;
            width: 90%;
            margin: 0 auto;
        }

        /* Icon column: centered; label column: left; value column: right */
        #weather-table td:nth-child(1) { text-align: center; }
        #weather-table td:nth-child(2) { text-align: left; font-size: 28pt; padding-right: 4px; }
        #weather-table td:last-child   { text-align: right; font-size: 32pt; }

        /* ── PHONE LAYOUT ── */
        @media (max-width: 600px) {
            body           { font-size: 20pt; }
            .item-header   { padding-top: 0.4em; }
            .item-current  { padding-left: 0.1em; padding-right: 0.1em; }
            .item-footer   { padding-left: 0.1em; padding-right: 0.1em; }
            table          { margin-left: 0; }
            .title-banner  { margin: 0 0.2em 8px 0.2em; }
            #weather-table {
                width: 100%;
                table-layout: fixed;
            }
            #weather-table td:nth-child(1) { width: 44px; padding: 4px 2px 4px 0; text-align: left; }
            #weather-table td:nth-child(1) img { display: block; margin-left: -2px; height: 64px !important; width: auto !important; }
            #weather-table td:nth-child(2) { width: 46%; font-size: 18pt; font-weight: bold; padding-right: 2px; padding-left: 8px; white-space: nowrap; }
            #weather-table td:last-child   { font-size: 16pt; font-weight: bold; text-align: right; white-space: nowrap; padding-left: 4px; }
            #sun img[src='inclination.png'] { height: 26px !important; }
            #sun img[src='azimuth.png']     { height: 32px !important; }
            #wind button { width: 38px !important; height: 38px !important; font-size: 13pt !important; color: white !important; }
            #date-line   { font-size: 62% !important; text-align: center; margin: 4px 0 0 0; }
            #current-header { font-size: 62% !important; }
        }
    </style>
</head>

<body>
    <div class="background-container"></div>
    <div class="background-overlay"></div>
    <div class="layout">

        <div class="item-header">
            <div class="title-banner">
                <!-- Flag shows the language you can switch TO, not the current language -->
                <button id="lang-toggle" onclick="toggleLanguage()">🇺🇸</button>
                <center><h1 id="title-main" style="font-size: 135%; color:#4A4038">SMA Weather</h1></center>
                <center><h3 id="title-sub" style="font-size: 60%; color:#5A4F47; margin-top: -40px; margin-bottom: 2px;">Central Mexico 6,614 ft</h3></center>
                <p id="date-line" style="font-size: 40%; font-weight: bold; text-align: center; margin: 0 0 4px 0;"><span id="updated">-</span> <span id="offline"></span></p>
            </div>

            <p id="message" hidden></p>
        </div>

        <div class="item-current">
            <h3 id="current-header" style="font-size: 55%; text-align: center; color: #4A4038;">Current Conditions</h3>
            <table id="weather-table">
                <tr><td style="text-align:center"><img src="temperature.png" height="80"></td><td id="lbl-temp">Temperature</td><td><span id="temperature">-</span></td></tr>
                <tr><td style="text-align:center"><img src="humidity.png" height="80"></td><td id="lbl-humidity">Humidity</td><td><span id="humidity">-</span></td></tr>
                <tr><td style="text-align:center"><img src="pressure.png" height="80"></td><td id="lbl-pressure">Pressure</td><td><span id="pressure">-</span></td></tr>
                <tr><td style="text-align:center"><img src="rain.png" height="80"></td><td id="lbl-rain">Rain</td><td><span id="rain">-</span></td></tr>
                <tr><td style="text-align:center"><img src="wind.png" height="80"></td><td id="lbl-wind">Wind</td><td><span id="wind">-</span></td></tr>
                <tr><td style="text-align:center"><img src="battery.png" height="80"></td><td id="lbl-battery">Battery</td><td><span id="batterypercentage">-</span></td></tr>
                <tr><td style="text-align:center"><img src="sun.png" height="80"></td><td id="lbl-sun">Sun</td><td><span id="sun">-</span></td></tr>
                <tr><td style="text-align:center; vertical-align:bottom; padding-top:6px"><img src="sunrise.png" height="88"></td><td id="lbl-sunrise">Sunrise<span style='font-weight:bold;font-size:150%'>/</span>Sunset</td><td><span id="sunrisesunset">-</span></td></tr>
            </table>
        </div>

        <div class="item-forecast" id="item_forecast" hidden>
            <h3 id="forecast-header">Forecast</h3>
            <table id="forecast-table" class="forecast-table"></table>
            <p><em><span id="lbl-datafrom">Data from</span> <span id="station">-</span> (<a target="_blank" rel="noopener noreferrer" href="http://openweathermap.org">openweathermap.org</a>)</em></p>
        </div>

        <div class="item-footer">
            <p id="footer-text" style="font-size: 40%; text-align: center; color: #5A4F47;">© 2026 SMA Weather</p>
        </div>
    </div>

<script>
    /* ── LANGUAGE SYSTEM ── */
    let currentLang = "en";
    let lastUpdatedStr = "-";
    const _cache = {};

    function formatDateForLang(dateStr, lang) {
        if (dateStr === "-" || lang === "en") return dateStr;
        const days   = { "Sun":"Dom","Mon":"Lun","Tue":"Mar","Wed":"Mié","Thu":"Jue","Fri":"Vie","Sat":"Sáb" };
        const months = { "Jan":"ene","Feb":"feb","Mar":"mar","Apr":"abr","May":"may","Jun":"jun",
                         "Jul":"jul","Aug":"ago","Sep":"sep","Oct":"oct","Nov":"nov","Dec":"dic" };
        let result = dateStr;
        for (const [en, es] of Object.entries(days))   result = result.replace(en, es);
        for (const [en, es] of Object.entries(months)) result = result.replace(en, es);
        return result;
    }

    const translations = {
        en: {
            titleMain:    "SMA Weather",
            titleSub:     "Central Mexico 6,614 ft",
            current:      "Current Conditions",
            forecast:     "Forecast",
            temp:         "Temperature",
            humidity:     "Humidity",
            pressure:     "Pressure",
            rain:         "Rain",
            wind:         "Wind",
            battery:      "Battery",
            sun:          "Sun",
            sunrise:      "Sunrise<span style='font-weight:bold;font-size:150%'>/</span>Sunset",
            updated:      "Date/Time",
            dataFrom:     "Data from",
            footer:       "© 2026 SMA Weather",
            toggleButton: "🇲🇽",
            today:        "Today",
            tomorrow:     "Tomorrow"
        },
        es: {
            titleMain:    "Clima SMA",
            titleSub:     "México Central 6,614 pies",
            current:      "Condiciones Actuales",
            forecast:     "Pronóstico",
            temp:         "Temperatura",
            humidity:     "Humedad",
            pressure:     "Presión",
            rain:         "Lluvia",
            wind:         "Viento",
            battery:      "Batería",
            sun:          "Sol",
            sunrise:      "Amanecer<span style='font-weight:bold;font-size:150%'>/</span>Atardecer",
            updated:      "Fecha/Hora",
            dataFrom:     "Datos de",
            footer:       "© 2026 Clima SMA",
            toggleButton: "🇺🇸",
            today:        "Hoy",
            tomorrow:     "Mañana"
        }
    };

    function applyLanguage() {
        const t = translations[currentLang];
        document.getElementById("title-main").innerText    = t.titleMain;
        document.getElementById("title-sub").innerText     = t.titleSub;
        document.getElementById("current-header").innerText = t.current;
        document.getElementById("forecast-header").innerText = t.forecast;
        document.getElementById("lbl-temp").innerHTML      = t.temp;
        document.getElementById("lbl-humidity").innerHTML  = t.humidity;
        document.getElementById("lbl-pressure").innerHTML  = t.pressure;
        document.getElementById("lbl-rain").innerHTML      = t.rain;
        document.getElementById("lbl-wind").innerHTML      = t.wind;
        document.getElementById("lbl-battery").innerHTML   = t.battery;
        document.getElementById("lbl-sun").innerHTML       = t.sun;
        document.getElementById("lbl-sunrise").innerHTML   = t.sunrise;
        document.getElementById("lbl-datafrom").innerHTML  = t.dataFrom;
        document.getElementById("footer-text").innerHTML   = t.footer;
        document.getElementById("lang-toggle").innerText   = t.toggleButton;
        setIfChanged("updated", formatDateForLang(lastUpdatedStr, currentLang));
    }

    function toggleLanguage() {
        currentLang = currentLang === "en" ? "es" : "en";
        applyLanguage();
    }

    applyLanguage();

    /* ── WEATHER DATA ── */
    let windDirectionsArray = [
        ['N','North'],['NNE','North-Northeast'],['NE','Northeast'],['ENE','East-Northeast'],
        ['E','East'],['ESE','East-Southeast'],['SE','Southeast'],['SSE','South-Southeast'],
        ['S','South'],['SSW','South-Southwest'],['SW','Southwest'],['WSW','West-Southwest'],
        ['W','West'],['WNW','West-Northwest'],['NW','Northwest'],['NNW','North-Northwest']
    ];
    let windDirections = new Map(windDirectionsArray);
    let windSpeedUnit  = "mph";
    const coloredtemperatures = true;

    function getForecastDataWithConfiguration(latitude, longitude, numdays, apikey) {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                var jsonObj = JSON.parse(this.responseText);
                var table = "";
                const dateoptions    = { weekday: 'short', day: 'numeric' };
                const todaydate      = new Date();
                const todaydatestr   = todaydate.toLocaleDateString('en-US', dateoptions);
                const tomorrowdate   = new Date();
                tomorrowdate.setDate(tomorrowdate.getDate() + 1);
                const tomorrowdatestr = tomorrowdate.toLocaleDateString('en-US', dateoptions);
                const t = translations[currentLang];

                document.getElementById("station").innerHTML = jsonObj.city.name;

                for (let i = 0; i < jsonObj.list.length; i++) {
                    var datestr  = new Date(jsonObj.list[i].dt*1000).toLocaleDateString('en-US', dateoptions);
                    var dayofweek = new Date(jsonObj.list[i].dt*1000).getDay();

                    if (datestr == todaydatestr)        datestr = t.today;
                    else if (datestr == tomorrowdatestr) datestr = t.tomorrow;

                    table += (dayofweek==0||dayofweek==6) ? "<tr class='forecast-weekend-row'>" : "<tr>";
                    table += "<td><nobr>" + datestr + "</nobr></td>";

                    if (jsonObj.list[i].weather[0].icon.endsWith("d"))
                        table += "<td><img src='WeatherIcon" + jsonObj.list[i].weather[0].icon + ".png' height='80'></td>";
                    else
                        table += "<td><img src='WeatherIcon" + jsonObj.list[i].weather[0].icon.slice(0,-1) + "d.png' height='80'></td>";

                    var temp = ((jsonObj.list[i].temp.max * 9/5) + 32).toFixed(0) + "<span style='font-weight:bold;font-size:150%'>/</span>" +
                               ((jsonObj.list[i].temp.min * 9/5) + 32).toFixed(0) + " &#8457;";
                    table += "<td><nobr>" + temp + "</nobr></td>";

                    var windspeed = "-";
                    var windspeedval = jsonObj.list[i].speed;
                    if (windspeedval != "-") {
                        switch(windSpeedUnit) {
                            case "mph": windspeed = (windspeedval * 2.23694).toFixed(1) + " mph"; break;
                            case "m/s": windspeed = windspeedval.toFixed(1) + " <sup>m</sup>&frasl;<sub>s</sub>"; break;
                            case "kn":  windspeed = (windspeedval * 1.94384).toFixed(1) + " kn"; break;
                        }
                    }

                    if (jsonObj.list[i].deg != "-") {
                        var winddeg   = jsonObj.list[i].deg;
                        var windabbr  = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
                        var windindex = Math.round(((winddeg %= 360) < 0 ? winddeg + 360 : winddeg) / 22.5) % 16;
                        windspeed += " <img src='wind" + windabbr[windindex] + ".png' height='32'> <nobr>" + windabbr[windindex] + "</nobr>";
                    }
                    table += "<td>" + windspeed + "</td>";

                    var rain = "-";
                    if (jsonObj.list[i].rain != undefined)
                        rain = jsonObj.list[i].rain.toFixed(1) + " mm";
                    table += rain != "-"
                        ? "<td><img src='raindrop.png' height='40' style='vertical-align:middle'> " + rain + "</td>"
                        : "<td>" + rain + "</td>";

                    table += "</tr>\n";
                }
                document.getElementById("forecast-table").innerHTML = table;
                document.getElementById("item_forecast").hidden = false;
            }
        };
        xhttp.open("GET", "https://api.openweathermap.org/data/2.5/forecast/daily?lat=" + latitude +
            "&lon=" + longitude + "&cnt=" + numdays + "&appid=" + apikey + "&units=metric", true);
        xhttp.send();
    }

    function getForecastData() {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                var jsonObj = JSON.parse(this.responseText);
                if (jsonObj.latitude == undefined || jsonObj.latitude == 0)
                    document.getElementById("item_forecast").hidden = true;
                else
                    getForecastDataWithConfiguration(jsonObj.latitude, jsonObj.longitude, jsonObj.numdays, jsonObj.apikey);
            }
        };
        xhttp.open("GET", "forecast-configuration.json", true);
        xhttp.send();
    }

    function setIfChanged(id, value) {
        if (_cache[id] === value) return;
        _cache[id] = value;
        var el = document.getElementById(id);
        if (el) el.innerHTML = value;
    }

    function getWeatherData() {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                var response = JSON.parse(this.responseText);
                var jsonObj  = response.record || response;

                if (jsonObj.message != undefined && jsonObj.message != "")
                    setIfChanged("message", jsonObj.message);
                else
                    document.getElementById("message").hidden = true;

                var temperature = "-";
                if (jsonObj.weather.temperature != "-") {
                    var tempF = (parseFloat(jsonObj.weather.temperature) * 9/5 + 32).toFixed(1);
                    temperature = tempF + " &#8457;";
                    if (jsonObj.aggregated.mintemperature != "-" && jsonObj.aggregated.maxtemperature != "-") {
                        var minF = (parseFloat(jsonObj.aggregated.mintemperature) * 9/5 + 32).toFixed(0);
                        var maxF = (parseFloat(jsonObj.aggregated.maxtemperature) * 9/5 + 32).toFixed(0);
                        if (coloredtemperatures)
                            temperature += " (<span style='color:#5b7c99'>&mapstodown;" + minF + "</span> <span style='color:#b85042'>&mapstoup;" + maxF + "</span>)";
                        else
                            temperature += " (&mapstodown;" + minF + " &mapstoup;" + maxF + ")";
                    }
                }
                setIfChanged("temperature", temperature);

                setIfChanged("humidity",
                    jsonObj.weather.humidity == "-" ? "-" : jsonObj.weather.humidity + " %rH");

                var pressure = "-";
                if (jsonObj.weather.pressure != "-") {
                    pressure = (parseFloat(jsonObj.weather.pressure) * 0.02953).toFixed(2) + " inHg";
                    if (jsonObj.aggregated.barotrend != "-") {
                        if (jsonObj.aggregated.barotrend > 1)       pressure += " rising";
                        else if (jsonObj.aggregated.barotrend < -1)  pressure += " falling";
                    }
                }
                setIfChanged("pressure", pressure);

                var rain = "-";
                if (jsonObj.aggregated.rainhour != "-") {
                    rain = jsonObj.aggregated.rainhour + " <sup>mm</sup>&frasl;<sub>h</sub>";
                    if (jsonObj.aggregated.rainday != "-")
                        rain += ", " + jsonObj.aggregated.rainday + " <sup>mm</sup>&frasl;<sub>d</sub>";
                }
                setIfChanged("rain", rain);

                var wind = "-";
                if (jsonObj.aggregated.windmps == "-") {
                    wind = jsonObj.weather.winddirection != "-" ? jsonObj.weather.winddirection : "-";
                } else {
                    switch(windSpeedUnit) {
                        case "mph": wind = jsonObj.aggregated.windmph != "-" ? jsonObj.aggregated.windmph : (parseFloat(jsonObj.aggregated.windmps) * 2.23694).toFixed(1); break;
                        case "m/s": wind = jsonObj.aggregated.windmps; break;
                        case "kn":  wind = jsonObj.aggregated.windknots; break;
                    }
                    var htmlWindSpeedUnit = windSpeedUnit;
                    if (htmlWindSpeedUnit == "m/s") htmlWindSpeedUnit = "<sup>m</sup>&frasl;<sub>s</sub>";
                    wind += " <button style='background-color:#5b7c99;color:white;font-size:16pt;padding:0;border-radius:50%;width:48px;height:48px;border:none;display:inline-flex;align-items:center;justify-content:center;line-height:1;' type='button' onclick='changeWindSpeedUnit()'>" + htmlWindSpeedUnit + "</button>";

                    switch(windSpeedUnit) {
                        case "mph":
                            var gustsMph = jsonObj.aggregated.gustsmph != "-" ? jsonObj.aggregated.gustsmph :
                                           (jsonObj.aggregated.gustsmps != "-" ? (parseFloat(jsonObj.aggregated.gustsmps) * 2.23694).toFixed(1) : "-");
                            if (gustsMph != "-" && gustsMph != wind.split(" ")[0])
                                wind += " (gusts " + gustsMph + ")";
                            break;
                        case "m/s":
                            if (jsonObj.aggregated.gustsmps != "-" && jsonObj.aggregated.gustsmps != jsonObj.aggregated.windmps)
                                wind += " (gusts " + jsonObj.aggregated.gustsmps + ")";
                            break;
                        case "kn":
                            if (jsonObj.aggregated.gustsknots != "-" && jsonObj.aggregated.gustsknots != jsonObj.aggregated.windknots)
                                wind += " (gusts " + jsonObj.aggregated.gustsknots + ")";
                            break;
                    }
                    if (jsonObj.weather.winddirection != "-") {
                        wind += " <img src='wind" + jsonObj.weather.winddirection + ".png' height='32' style='vertical-align:middle'>&nbsp;";
                        wind += jsonObj.weather.winddirection;
                    }
                }
                setIfChanged("wind", wind);

                var sun = "-";
                if (jsonObj.sun.azimuth != "-" && jsonObj.sun.inclination != "-")
                    sun = "<img src='inclination.png' height='32' style='vertical-align:middle'> " +
                          jsonObj.sun.inclination + "&deg; <img src='azimuth.png' height='40' style='vertical-align:middle'> " +
                          jsonObj.sun.azimuth + "&deg;";
                setIfChanged("sun", sun);

                var sunrisesunset = "-";
                if (jsonObj.sun.sunrise != undefined && jsonObj.sun.sunrise != "-" &&
                    jsonObj.sun.sunset  != undefined && jsonObj.sun.sunset  != "-") {
                    var sr = jsonObj.sun.sunrise;
                    var ss = jsonObj.sun.sunset;
                    if (window.innerWidth <= 600) {
                        sr = sr.replace(/\s*(AM|PM)/i, "");
                        ss = ss.replace(/\s*(AM|PM)/i, "");
                    }
                    sunrisesunset = sr + "<span style='font-weight:bold;font-size:150%'>/</span>" + ss;
                }
                setIfChanged("sunrisesunset", sunrisesunset);

                setIfChanged("batterypercentage",
                    jsonObj.weather.batterypercentage == "-" ? "-" : jsonObj.weather.batterypercentage + " %");

                lastUpdatedStr = jsonObj["updated-de"];
                setIfChanged("updated", formatDateForLang(lastUpdatedStr, currentLang));

                if (jsonObj["updated-de"] != "-") {
                    setIfChanged("offline", jsonObj["offline"]
                        ? "<img src='RedDot12.png' height='12' style='vertical-align:middle'>"
                        : "<img src='GreenDot12.png' height='12' style='vertical-align:middle'>");
                } else {
                    setIfChanged("offline", "");
                }
            }
        };
        xhttp.open("GET", "https://api.jsonbin.io/v3/b/696e511cae596e708fe6da08/latest", true);
        xhttp.setRequestHeader("X-Master-Key", "$2a$10$dCy/XwpaTUMoRY9vdQ4dAeZ5/zHT/RfoIafaH4YTtvOBTpigZQqum");
        xhttp.send();
    }

    function changeWindSpeedUnit() {
        switch(windSpeedUnit) {
            case "mph": windSpeedUnit = "m/s"; break;
            case "m/s": windSpeedUnit = "kn";  break;
            case "kn":  windSpeedUnit = "mph"; break;
        }
        getWeatherData();
        getForecastData();
    }

    setInterval(function() { getWeatherData();   }, 20*1000);
    setInterval(function() { getForecastData(); }, 15*60*1000);
    getWeatherData();
    getForecastData();
</script>

</body>
</html>
